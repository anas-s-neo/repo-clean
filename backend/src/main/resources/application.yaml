spring:
  application:
    name: repo-clean
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:stalebranchdb}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  thymeleaf:
    cache: false

github:
  token: ${GITHUB_TOKEN:}
  api-url: ${GITHUB_API_URL:https://api.github.com}
  organisations: ${GITHUB_ORGS:my-github-org}

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  token-secret: ${TOKEN_SECRET:changeme-use-a-long-random-string-in-production}
  token-expiry-days: 7
  stale-days: 90
  mail-from: ${MAIL_FROM:noreply@yourorg.com}
  mail-from-name: "Branch Cleanup Bot"
  deletion-delay-hours: 12

scheduling:
  enabled: ${SCHEDULING_ENABLED:true}
  branch-detection-cron: "0 0 2 * * SUN"
  email-dispatch-cron: "0 0 8 * * SUN"
  reminder-check-rate-ms: 900000
  deletion-check-rate-ms: 900000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.org.stalebranchcleaner: DEBUG
    org.kohsuke.github: WARN

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

scheduling:
  enabled: false