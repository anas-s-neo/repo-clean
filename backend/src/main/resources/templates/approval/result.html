<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Result: ' + ${action}"></title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); max-width: 480px; width: 100%; padding: 40px 32px; text-align: center; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h1 { font-size: 24px; margin-bottom: 12px; }
        .message { font-size: 16px; color: #334155; margin-bottom: 24px; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 8px; font-weight: 600; background: #3b82f6; color: white; text-decoration: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon" th:text="${success ? '✅' : '🛡️'}"></div>
    <h1 th:text="${success ? 'Branch Approved for Deletion' : 'Branch Denied'}"></h1>
    <p class="message" th:text="${message}"></p>
    <div style="font-size: 14px; color: #64748b; margin-bottom: 24px;">
        <div><strong>Repository:</strong> <span th:text="${repoFullName}"></span></div>
        <div><strong>Branch:</strong> <code th:text="${branchName}"></code></div>
    </div>
    <a href="/" class="btn">Go to Dashboard</a>
</div>
</body>
</html>
